# ==========================================
# DEPLOYMENT (Render / Production)
# ==========================================
spring.application.name=backend

# Render \u0938\u094D\u0935\u0924\u0903 PORT env var inject \u0915\u0930\u0924\u094B, \u0928\u093E\u0939\u0940\u0924\u0930 default 8081 \u0918\u0947\u0908\u0932
server.port=${PORT:8081}

# Database credentials (Render Environment Variables \u092E\u0927\u0942\u0928 \u092F\u0947\u0924\u0940\u0932)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# \u26A0\uFE0F CRITICAL FIX: \u0939\u093E line add \u0915\u0947\u0932\u094D\u092F\u093E\u092E\u0941\u0933\u0947 'Unable to determine Dialect' error \u092F\u0947\u0923\u093E\u0930 \u0928\u093E\u0939\u0940
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect